name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  static-checks:
    name: Static checks (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate composer metadata
        run: composer validate --no-check-publish

      - name: Check PHP syntax
        run: find app/code/Frodo/Antifraud -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Install XML validation tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Check XML syntax
        run: find app/code/Frodo/Antifraud -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout

      - name: Check i18n CSV structure
        run: |
          php <<'PHP'
          <?php
          $hasErrors = false;
          foreach (glob('app/code/Frodo/Antifraud/i18n/*.csv') as $file) {
              $handle = fopen($file, 'rb');
              if ($handle === false) {
                  fwrite(STDERR, "Unable to open {$file}\n");
                  $hasErrors = true;
                  continue;
              }

              $lineNumber = 0;
              while (($row = fgetcsv($handle)) !== false) {
                  ++$lineNumber;
                  if (count($row) !== 2) {
                      fwrite(STDERR, "{$file}:{$lineNumber} must contain exactly 2 CSV columns\n");
                      $hasErrors = true;
                  }
              }

              fclose($handle);
          }

          exit($hasErrors ? 1 : 0);
          PHP

  magento-coding-standard:
    name: Magento coding standard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install Magento Coding Standard
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress 'magento/magento-coding-standard:40'

      - name: Run PHPCS with Magento 2 standard
        run: $(composer global config home)/vendor/bin/phpcs --standard=phpcs.xml.dist
